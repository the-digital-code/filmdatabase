name: Film Database CI

on: 
  push:
    branches: [ main ]

jobs: 
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
          
      - name: Build
        run: mvn clean package
  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
          
      - name: Test
        run: mvn test
  run:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
          
      - name: run application
        run: |
          nohup mvn spring-boot:run > app.log 2>&1 & sleep 20
  
 
  docker_build:
    runs-on: ubuntu-latest
    needs: run
    steps:
    - uses: actions/checkout@v4

    - name: Docker build
      run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/filmdatabase-app:${{ github.sha }} .

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Docker push
      run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/filmdatabase-app:${{ github.sha }}         



  deploy:
    runs-on: ubuntu-latest
    needs: run

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
          
      - name: Build WAR
        run: mvn clean package -DskipTests
        
      - name: Copy WAR to Azure VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.AZURE_VM_HOST }}
          username: azureuser
          key: ${{ secrets.AZURE_VM_SSH_KEY }}
          source: "target/filmdatabase-0.0.1-SNAPSHOT.war"
          target: "/home/azureuser/"
          strip_components: 1

      - name: Restart Tomcat Service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AZURE_VM_HOST }}
          username: azureuser
          key: ${{ secrets.AZURE_VM_SSH_KEY }}
          script: |
            echo hello world
            sudo cp /home/azureuser/filmdatabase-0.0.1-SNAPSHOT.war /opt/tomcat/webapps/
            sudo systemctl restart tomcat10