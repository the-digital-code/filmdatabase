version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: film-db-mysql
    restart: always
    environment:
      MYSQL_DATABASE: filmdb
      MYSQL_ROOT_PASSWORD: password
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  app:
    build: .
    container_name: film-app
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8082:8082"
    environment:
      - SPRING_PROFILES_ACTIVE=mysql
      - MYSQL_HOST=db
      - MYSQL_DATABASE=filmdb
      - MYSQL_USER=root
      - MYSQL_PASSWORD=password
    restart: on-failure
